<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公演メンテナンス</title>
  <link rel="stylesheet" href="maintenance.css">
  <script src="maintenance.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">HOKURIKU THEATER DATA</p>
      <h1>公演メンテナンス</h1>
      <p id="syncSummary" class="muted">同期情報を確認しています…</p>
    </div>
    <div class="actions">
      <button id="syncButton" class="button secondary">GitHubから最新データ取得</button>
      <button id="publishButton" class="button primary">補正をGitHubへ反映</button>
    </div>
  </header>

  <section id="warningBar" class="warning" hidden></section>
  <section class="metrics" aria-label="データ件数">
    <article><span>取得データ</span><strong id="baseCount">0</strong></article>
    <article><span>公開予定</span><strong id="scheduleCount">0</strong></article>
    <article><span>手動補正</span><strong id="overrideCount">0</strong></article>
    <article><span>要確認</span><strong id="problemCount">0</strong></article>
  </section>

  <main class="workspace">
    <aside class="list-pane">
      <div class="filters">
        <label>検索<input id="searchInput" type="search" placeholder="公演名・団体・会場"></label>
        <div class="filter-grid">
          <label>都道府県<select id="prefectureFilter"><option value="">すべて</option></select></label>
          <label>公開指定<select id="publicationFilter"><option value="">すべて</option><option value="default">自動判定</option><option value="published">掲載確定</option><option value="excluded">除外確定</option></select></label>
        </div>
        <div class="checks">
          <label><input id="upcomingOnly" type="checkbox" checked> 開催前のみ</label>
          <label><input id="overrideOnly" type="checkbox"> 補正ありのみ</label>
        </div>
      </div>
      <p id="resultCount" class="result-count">0件</p>
      <div id="eventList" class="event-list" aria-live="polite"></div>
    </aside>

    <section class="detail-pane">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">✦</div>
        <h2>公演を選択してください</h2>
        <p>データがない場合は、上の「GitHubから最新データ取得」を実行します。</p>
      </div>

      <form id="editForm" hidden>
        <div class="detail-header">
          <div>
            <p id="eventId" class="event-id"></p>
            <h2 id="detailTitle">公演情報を補正</h2>
          </div>
          <span id="overrideBadge" class="badge" hidden>補正あり</span>
        </div>

        <div class="form-grid">
          <label class="wide">公演名<input name="event_name" required></label>
          <label class="wide">正規化公演名<input name="normalized_event_name"></label>
          <label>団体名<input name="organization"></label>
          <label>カテゴリ<input name="category"></label>
          <label>会場名<input name="venue_name"></label>
          <label>正規化会場名<input name="normalized_venue_name"></label>
          <label class="wide">所在地<input name="location"></label>
          <label class="wide">正規化所在地<input name="normalized_location"></label>
          <label>開始日<input name="start_date" type="date"></label>
          <label>終了日<input name="end_date" type="date"></label>
          <label>開始時刻<input name="start_time" type="time"></label>
          <label>抽出推奨<select name="posting_recommendation"><option value="">未指定</option><option value="post">post</option><option value="review">review</option><option value="skip">skip</option></select></label>
          <label>告知投稿<select name="is_event_announcement"><option value="">未指定</option><option value="true">はい</option><option value="false">いいえ</option></select></label>
          <label>具体的日程あり<select name="has_actionable_schedule_info"><option value="">未指定</option><option value="true">はい</option><option value="false">いいえ</option></select></label>
          <label class="wide">公式参照URL<input name="manual_reference_url" type="url" placeholder="https://..."></label>
          <label>公開指定<select name="manual_publish_status"><option value="default">自動判定</option><option value="published">掲載確定</option><option value="excluded">除外確定</option></select></label>
          <label class="wide">補正メモ<textarea id="noteInput" rows="3" placeholder="確認した公式情報など"></textarea></label>
        </div>

        <section class="preview-card">
          <div><span class="preview-label">公開プレビュー</span><strong id="previewStatus"></strong></div>
          <p id="previewText"></p>
          <a id="previewLink" target="_blank" rel="noreferrer" hidden>参照先を開く</a>
        </section>

        <section class="source-card">
          <h3>元ツイート</h3>
          <div id="sourceLinks"></div>
        </section>

        <div class="form-actions">
          <button id="deleteButton" type="button" class="button danger">補正を解除</button>
          <button type="submit" class="button primary">補正を保存</button>
        </div>
      </form>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
</body>
</html>
