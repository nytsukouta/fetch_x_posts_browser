name: Daily Theater Pipeline

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-theater-pipeline
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      GITHUB_MODELS_MODEL: ${{ vars.GH_MODELS_MODEL || 'openai/gpt-4.1-mini' }}
      GITHUB_MODELS_API_VERSION: ${{ vars.GH_MODELS_API_VERSION || '2026-03-10' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$X_BEARER_TOKEN" || { echo "X_BEARER_TOKEN is required"; exit 1; }
          test -n "$GH_MODELS_TOKEN" || { echo "GH_MODELS_TOKEN is required"; exit 1; }

      - name: Rebuild query configuration
        run: python src/build_priority_queries_from_masters.py

      - name: Run API pipeline
        run: python src/run_pipeline.py

      - name: Commit and push updates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/priority_queries.json docs/data/schedule_list.json docs/data/master_data.json
          if git diff --cached --quiet; then
            echo "No publishable changes"
            exit 0
          fi
          git commit -m "Update published theater data"
          git push