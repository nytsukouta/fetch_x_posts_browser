name: Daily Theater Pipeline

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:
    inputs:
      post_mode:
        description: "X 投稿モード"
        required: true
        default: dry-run
        type: choice
        options:
          - off
          - dry-run
          - live
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-pipeline.yml"
      - "config/**"
      - "data/output/organization_master.csv"
      - "data/output/venue_master.csv"
      - "docs/**"
      - "src/**"

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: daily-theater-pipeline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      POST_MODE: ${{ github.event_name == 'schedule' && 'live' || github.event_name == 'workflow_dispatch' && github.event.inputs.post_mode || 'off' }}
      TZ: Asia/Tokyo
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      GITHUB_MODELS_MODEL: ${{ vars.GH_MODELS_MODEL || 'openai/gpt-4.1-mini' }}
      GITHUB_MODELS_API_VERSION: ${{ vars.GH_MODELS_API_VERSION || '2026-03-10' }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/ -q

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$X_BEARER_TOKEN" || { echo "X_BEARER_TOKEN is required"; exit 1; }
          test -n "$GH_MODELS_TOKEN" || { echo "GH_MODELS_TOKEN is required"; exit 1; }
          if [[ "$POST_MODE" == "live" ]]; then
            test -n "$X_API_KEY" || { echo "X_API_KEY is required for live posting"; exit 1; }
            test -n "$X_API_SECRET" || { echo "X_API_SECRET is required for live posting"; exit 1; }
            test -n "$X_ACCESS_TOKEN" || { echo "X_ACCESS_TOKEN is required for live posting"; exit 1; }
            test -n "$X_ACCESS_TOKEN_SECRET" || { echo "X_ACCESS_TOKEN_SECRET is required for live posting"; exit 1; }
          fi

      - name: Restore pipeline caches
        uses: actions/cache/restore@v4
        with:
          path: |
            data/output/posted_events.csv
            data/output/structured_events_cumulative.csv
            data/output/structured_events_filtered_cumulative.csv
            data/output/event_cumulative.csv
          key: posted-events-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            posted-events-${{ github.ref_name }}-

      - name: Restore durable pipeline history
        shell: bash
        env:
          ACTIONS_REPO_TOKEN: ${{ github.token }}
          PIPELINE_HISTORY_ARTIFACT_NAME: pipeline-history-${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import io
          import json
          import os
          import zipfile
          from pathlib import Path
          from urllib import error, parse, request

          output_dir = Path("data/output")
          structured_path = output_dir / "structured_events_cumulative.csv"
          posted_path = output_dir / "posted_events.csv"

          if structured_path.exists() and posted_path.exists():
            print("durable history restore skipped: cache already restored structured and posted logs")
            raise SystemExit(0)

          token = os.environ["ACTIONS_REPO_TOKEN"].strip()
          artifact_name = os.environ["PIPELINE_HISTORY_ARTIFACT_NAME"].strip()
          repository = os.environ["REPOSITORY"].strip()
          list_url = (
            f"https://api.github.com/repos/{repository}/actions/artifacts?"
            f"{parse.urlencode({'name': artifact_name, 'per_page': 100})}"
          )
          headers = {
            "Accept": "application/vnd.github+json",
            "Authorization": f"Bearer {token}",
            "User-Agent": "hokuriku-theater-pipeline",
          }

          try:
            api_request = request.Request(list_url, headers=headers)
            with request.urlopen(api_request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))
          except error.HTTPError as exc:
            print(f"durable history restore skipped: artifact listing failed with HTTP {exc.code}")
            raise SystemExit(0)
          except error.URLError as exc:
            print(f"durable history restore skipped: artifact listing failed: {exc}")
            raise SystemExit(0)

          artifacts = [artifact for artifact in payload.get("artifacts", []) if not artifact.get("expired")]
          if not artifacts:
            print(f"durable history restore skipped: no artifact named {artifact_name}")
            raise SystemExit(0)

          latest_artifact = max(
            artifacts,
            key=lambda artifact: str(artifact.get("updated_at") or artifact.get("created_at") or ""),
          )
          class NoRedirectHandler(request.HTTPRedirectHandler):
            def redirect_request(self, req, fp, code, msg, headers, newurl):
              return None

          redirect_opener = request.build_opener(NoRedirectHandler)
          archive_download_url = str(latest_artifact["archive_download_url"])
          signed_download_url = ""
          try:
            download_request = request.Request(archive_download_url, headers=headers)
            with redirect_opener.open(download_request, timeout=60) as response:
              signed_download_url = str(response.headers.get("Location") or response.geturl() or "")
          except error.HTTPError as exc:
            if exc.code not in {301, 302, 303, 307, 308}:
              print(f"durable history restore skipped: artifact download handshake failed with HTTP {exc.code}")
              raise SystemExit(0)
            signed_download_url = str(exc.headers.get("Location") or "")
          except error.URLError as exc:
            print(f"durable history restore skipped: artifact download handshake failed: {exc}")
            raise SystemExit(0)

          if not signed_download_url:
            print(f"durable history restore skipped: artifact {latest_artifact['id']} returned no download URL")
            raise SystemExit(0)

          try:
            signed_request = request.Request(
              signed_download_url,
              headers={"User-Agent": "hokuriku-theater-pipeline"},
            )
            with request.urlopen(signed_request, timeout=60) as response:
              artifact_bytes = response.read()
          except error.HTTPError as exc:
            print(f"durable history restore skipped: signed artifact download failed with HTTP {exc.code}")
            raise SystemExit(0)
          except error.URLError as exc:
            print(f"durable history restore skipped: signed artifact download failed: {exc}")
            raise SystemExit(0)

          with zipfile.ZipFile(io.BytesIO(artifact_bytes)) as artifact_zip:
            artifact_members = artifact_zip.namelist()
            snapshot_name = next((name for name in artifact_members if name.endswith("pipeline_history_snapshot.zip")), "")
            if not snapshot_name:
              print(f"durable history restore skipped: artifact {latest_artifact['id']} has no pipeline_history_snapshot.zip")
              raise SystemExit(0)
            snapshot_bytes = artifact_zip.read(snapshot_name)

          with zipfile.ZipFile(io.BytesIO(snapshot_bytes)) as snapshot_zip:
            snapshot_zip.extractall(Path("."))

          print(
            "restored durable history artifact:",
            latest_artifact.get("id"),
            latest_artifact.get("updated_at") or latest_artifact.get("created_at") or "",
          )
          PY

      - name: Rebuild query configuration
        run: python src/build_priority_queries_from_masters.py

      - name: Seed cumulative history baseline
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          from pathlib import Path

          seed_path = Path("data/bootstrap/structured_events_cumulative_seed.csv")
          output_dir = Path("data/output")
          structured_path = output_dir / "structured_events_cumulative.csv"
          filtered_path = output_dir / "structured_events_filtered_cumulative.csv"

          if not seed_path.exists():
            raise SystemExit(0)

          def load_rows(path: Path):
            if not path.exists():
              return [], []
            with path.open("r", encoding="utf-8-sig", newline="") as handle:
              reader = csv.DictReader(handle)
              return list(reader), list(reader.fieldnames or [])

          seed_rows, seed_fields = load_rows(seed_path)
          current_rows, current_fields = load_rows(structured_path)
          fieldnames = list(seed_fields or current_fields)
          for fieldname in current_fields:
            if fieldname not in fieldnames:
              fieldnames.append(fieldname)

          merged_by_tweet_url = {}
          for row in seed_rows:
            tweet_url = (row.get("tweet_url") or "").strip()
            if tweet_url:
              merged_by_tweet_url[tweet_url] = row
          for row in current_rows:
            tweet_url = (row.get("tweet_url") or "").strip()
            if tweet_url:
              merged_by_tweet_url[tweet_url] = row

          merged_rows = sorted(
            merged_by_tweet_url.values(),
            key=lambda row: ((row.get("created_at") or ""), (row.get("tweet_url") or "")),
            reverse=True,
          )
          filtered_rows = [row for row in merged_rows if str(row.get("is_noise") or "").lower() != "true"]

          output_dir.mkdir(parents=True, exist_ok=True)
          for path, rows in ((structured_path, merged_rows), (filtered_path, filtered_rows)):
            with path.open("w", encoding="utf-8-sig", newline="") as handle:
              writer = csv.DictWriter(handle, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)

          print(f"seeded cumulative structured rows: {len(merged_rows)}")
          print(f"seeded cumulative filtered rows: {len(filtered_rows)}")
          PY

      - name: Run API pipeline
        shell: bash
        run: |
          set -euo pipefail
          args=()
          case "$POST_MODE" in
            live)
              args+=(--post-new-events)
              ;;
            dry-run)
              args+=(--post-new-events --post-dry-run)
              ;;
          esac
          python src/run_pipeline.py "${args[@]}"

      - name: Save posted event log
        if: success() && (hashFiles('data/output/posted_events.csv') != '' || hashFiles('data/output/structured_events_cumulative.csv') != '' || hashFiles('data/output/structured_events_filtered_cumulative.csv') != '' || hashFiles('data/output/event_cumulative.csv') != '')
        uses: actions/cache/save@v4
        with:
          path: |
            data/output/posted_events.csv
            data/output/structured_events_cumulative.csv
            data/output/structured_events_filtered_cumulative.csv
            data/output/event_cumulative.csv
          key: posted-events-${{ github.ref_name }}-${{ github.run_id }}

      - name: Build durable pipeline history snapshot
        if: success() && (hashFiles('data/output/posted_events.csv') != '' || hashFiles('data/output/structured_events_cumulative.csv') != '' || hashFiles('data/output/structured_events_filtered_cumulative.csv') != '' || hashFiles('data/output/event_cumulative.csv') != '')
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import zipfile

          snapshot_path = Path("data/output/pipeline_history_snapshot.zip")
          snapshot_path.parent.mkdir(parents=True, exist_ok=True)
          files = [
              Path("data/output/posted_events.csv"),
              Path("data/output/structured_events_cumulative.csv"),
              Path("data/output/structured_events_filtered_cumulative.csv"),
              Path("data/output/event_cumulative.csv"),
          ]

          with zipfile.ZipFile(snapshot_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in files:
                  if path.exists():
                      archive.write(path, arcname=str(path).replace("\\", "/"))

          print(f"built durable history snapshot: {snapshot_path}")
          PY

      - name: Upload durable pipeline history
        if: success() && hashFiles('data/output/pipeline_history_snapshot.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-history-${{ github.ref_name }}
          path: data/output/pipeline_history_snapshot.zip
          retention-days: 90

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Sync web/ to docs/
        run: python src/sync_web_to_docs.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Notify failure via Issue
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          title="Daily pipeline failed: $(date -u +%Y-%m-%dT%H:%MZ)"
          body=$'Daily Theater Pipeline が失敗しました。\n\nRun: '"$RUN_URL"$'\nTrigger: ${{ github.event_name }}\nRef: ${{ github.ref_name }}'
          existing=$(gh issue list --state open --label pipeline-failure --search "Daily pipeline failed in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label pipeline-failure || \
              gh issue create --title "$title" --body "$body"
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4