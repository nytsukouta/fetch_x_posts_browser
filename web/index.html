<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>北陸＋αの演劇スケジュール</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/ja.global.min.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="hero-kicker">Ishikawa Theater Watch</p>
        <nav class="page-nav" aria-label="ページ">
          <a class="page-nav-link is-current" href="./index.html">スケジュール</a>
          <a class="page-nav-link" href="./masters.html">劇団・劇場マスター</a>
        </nav>
        <h1>北陸＋αの演劇スケジュール</h1>
        <p class="hero-copy">
          X から収集して整形した公演情報を、予定確認しやすい一覧で表示します。
        </p>
        <p class="hero-disclaimer">
          ※ AI による自動収集のため、情報に誤りが含まれることがあります。最新・正確な内容は公式情報でご確認ください。
        </p>
        <div class="hero-meta">
          <div>
            <span class="meta-label">件数</span>
            <strong id="countValue">-</strong>
          </div>
          <div>
            <span class="meta-label">更新</span>
            <strong id="generatedAt">-</strong>
          </div>
        </div>
      </header>

      <section class="controls" aria-label="絞り込み">
        <label class="control search-control">
          <span>キーワード</span>
          <input id="searchInput" type="search" placeholder="イベント名、劇団名、劇場名で検索" />
        </label>
        <label class="control">
          <span>表示期間</span>
          <select id="dateScopeFilter">
            <option value="upcoming">今後のみ</option>
            <option value="all">すべて</option>
          </select>
        </label>
        <label class="control">
          <span>地域</span>
          <select id="locationFilter">
            <option value="">すべて</option>
          </select>
        </label>
      </section>

      <section class="status-bar">
        <p id="resultSummary">読み込み中です。</p>
        <button id="clearFiltersButton" class="clear-filters-button" type="button" hidden>条件をクリア</button>
      </section>

      <main>
        <div id="calendarRoot" class="calendar-root" aria-live="polite"></div>
      </main>
    </div>

    <dialog id="eventDialog" class="event-dialog" aria-label="公演詳細">
      <form method="dialog" class="event-dialog-inner">
        <button type="submit" class="event-dialog-close" value="close" aria-label="閉じる">×</button>
        <div class="event-dialog-body">
          <span class="event-dialog-countdown" hidden></span>
          <p class="event-dialog-date"></p>
          <h2 class="event-dialog-title"></h2>
          <dl class="event-dialog-details">
            <div>
              <dt>劇団</dt>
              <dd class="event-dialog-org"></dd>
            </div>
            <div>
              <dt>劇場</dt>
              <dd class="event-dialog-venue"></dd>
            </div>
            <div>
              <dt>地域</dt>
              <dd class="event-dialog-location"></dd>
            </div>
          </dl>
          <div class="event-dialog-links">
            <a class="primary-link" target="_blank" rel="noreferrer" hidden>参照先を開く</a>
            <a class="organization-link" hidden>劇団情報を見る</a>
            <a class="secondary-link" target="_blank" rel="noreferrer" hidden>元投稿を見る</a>
          </div>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
