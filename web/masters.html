<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>石川の劇団・劇場マスター</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="hero-kicker">Ishikawa Theater Watch</p>
        <nav class="page-nav" aria-label="ページ">
          <a class="page-nav-link" href="./index.html">スケジュール</a>
          <a class="page-nav-link is-current" href="./masters.html">劇団・劇場マスター</a>
        </nav>
        <h1>石川の劇団・劇場マスター</h1>
        <p class="hero-copy">
          手動で整備している劇団マスターと劇場マスターを、そのまま確認しやすい一覧で表示します。
        </p>
        <div class="hero-meta hero-meta-triple">
          <div>
            <span class="meta-label">劇団</span>
            <strong id="organizationCount">-</strong>
          </div>
          <div>
            <span class="meta-label">劇場</span>
            <strong id="venueCount">-</strong>
          </div>
          <div>
            <span class="meta-label">更新</span>
            <strong id="generatedAt">-</strong>
          </div>
        </div>
      </header>

      <section class="controls master-controls" aria-label="絞り込み">
        <label class="control search-control">
          <span>キーワード</span>
          <input id="searchInput" type="search" placeholder="名称、所在地で検索" />
        </label>
        <label class="control">
          <span>種別</span>
          <select id="typeFilter">
            <option value="organizations">劇団</option>
            <option value="venues">劇場</option>
          </select>
        </label>
        <label class="control">
          <span>地域</span>
          <select id="locationFilter">
            <option value="">すべて</option>
          </select>
        </label>
      </section>

      <section class="status-bar">
        <p id="resultSummary">読み込み中です。</p>
      </section>

      <main>
        <div id="masterGrid" class="schedule-grid master-grid" aria-live="polite"></div>
      </main>
    </div>

    <template id="masterCardTemplate">
      <article class="event-card master-card">
        <div class="event-card-header">
          <span class="event-chip master-chip"></span>
          <p class="event-date master-id"></p>
        </div>
        <h2 class="event-title master-title"></h2>
        <dl class="event-details master-details">
          <div>
            <dt>所在地</dt>
            <dd class="location-name"></dd>
          </div>
          <div class="website-row">
            <dt>公式サイト</dt>
            <dd class="website-value"></dd>
          </div>
          <div class="x-row">
            <dt>公式X</dt>
            <dd class="x-value"></dd>
          </div>
          <div class="query-row">
            <dt>クエリ対象</dt>
            <dd class="query-value"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="./masters.js"></script>
  </body>
</html>
